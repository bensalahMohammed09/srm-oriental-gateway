# ---- 1. Prevent Clickjacking ----
add_header X-Frame-Options "SAMEORIGIN" always;

# ---- 2. Prevent MIME Sniffing ----
add_header X-Content-Type-Options "nosniff" always;

# ---- 3. CROSS-SITE SCRIPTING(XSS) PROTECTION ----
add_header X-XSS-Protection "1; mode=block" always;

# ---- 4. Referrer Policy ----
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---- 5. Content Security Policy (CSP) ----
#add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8080 http://srm-api:9000;" always;

# ---- 6. HSTS (HTTP Strict Transport Security) ----
#add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ---- 7. Permissions Policy (formerly Feature Policy) ----
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# ---- 8. Performance ----
gzip on;
gzip_comp_level 5;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
# ---- 12. Logging (Example: Log Only Errors) ----
error_log /var/log/nginx/error.log error;