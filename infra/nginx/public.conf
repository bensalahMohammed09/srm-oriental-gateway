# Définition du format JSON pour les analytics (Dashboard Grafana)
log_format json_public escape=json '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status": "$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"upstream_addr":"$upstream_addr"'
'}';

server {
    # 🛡️ FIX : On remet 8080 car l'utilisateur 'nginx' est non-root
    listen 8080;
    server_name localhost;

    # On utilise le DNS interne de Docker
    resolver 127.0.0.11 valid=30s;

    client_max_body_size 50M;
    access_log /dev/stdout json_public;
    error_log /dev/stderr;

    # --- 1. Static Files (Frontend React/Angular) ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # 🛡️ FIX : Support du Routing SPA (React Router / Angular Router)
        try_files $uri $uri/ /index.html;
    }

    # --- 2. API Proxy ---
    location /api/ {
        set $upstream_api srm-api;

        # On pointe vers le port interne de ton API (9000)
        proxy_pass http://$upstream_api:9000;

        proxy_http_version 1.1;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }

    # --- 3. OpenAPI Documentation ---
    location /openapi/ {
        set $upstream_api srm-api;
        proxy_pass http://$upstream_api:9000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}