server {
    # Listen on the internal port defined in your Dockerfile
    listen 8080;
    server_name localhost;

    # --- 1. GLOBAL SECURITY HEADERS (The "Armor") ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- 2. PERFORMANCE & COMPRESSION ---
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- 3. FRONTEND ROUTING (React Static Files) ---
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Essential for React Router: If file isn't found, fallback to index.html
        try_files $uri $uri/ /index.html;
    }

    # --- 4. BACKEND ROUTING (.NET Core Reverse Proxy) ---
    location /api/ {
        # Intercepts any request starting with /api/ and forwards it to the .NET container
        proxy_pass http://srm-api:9000;
        
        proxy_http_version 1.1;
        proxy_set_header Connection keep-alive;
        
        # Passes the real user's identity/IP to .NET instead of Nginx's internal IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}