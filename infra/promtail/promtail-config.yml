server:
  http_listen_port: 9081
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3101/loki/api/v1/push

scrape_configs:
  - job_name: docker_service_discovery
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - replacement: "srm-oriental-gateway"
        target_label: 'project'

    pipeline_stages:
      - json:
          expressions:
            log_level: Level
            message: MessageTemplate
            http_status: Properties.StatusCode
            request_path: Properties.RequestPath
      - labels:
          log_level:
          http_status: