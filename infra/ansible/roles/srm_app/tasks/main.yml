---
# ==============================================================================
# 1. FILE SYSTEM PREPARATION & TEMPLATING
# ==============================================================================
- name: Ensure nginx configuration directory exists
  ansible.builtin.file:
    path: "{{ project_root }}/nginx"
    state: directory
    mode: '0755'

- name: Template nginx security headers
  ansible.builtin.template:
    src: security_headers.conf.j2
    dest: "{{ project_root }}/nginx/security_headers.conf"
    mode: '0644'

- name: Template nginx configuration
  ansible.builtin.template:
    src: public.conf.j2
    dest: "{{ project_root }}/nginx/public.conf"
    mode: '0644'      

- name: Template Unified Docker Compose file 
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ project_root }}/docker-compose.yml"
    mode: '0644'

# ==============================================================================
# 2. SURGICAL DEPLOYMENT (PULL & UP)
# ==============================================================================
- name: Pull target images from Docker Hub
  ansible.builtin.command: "docker compose -f {{ project_root }}/docker-compose.yml pull {{ target_services }}"
  args:
    chdir: "{{ project_root }}"

- name: Execute Surgical Update (Recreate only changed services)
  ansible.builtin.command: "docker compose -f {{ project_root }}/docker-compose.yml up -d --remove-orphans {{ target_services }}"
  args:
    chdir: "{{ project_root }}"

- name: Give containers 15 seconds to boot up and stabilize
  ansible.builtin.pause:
    seconds: 15

