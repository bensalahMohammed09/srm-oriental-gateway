global:
  scrape_interval: 15s # Default scrape interval
  evaluation_interval: 15s # Default evaluation interval

# Technical monnitoring targets 
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9091']
  
  - job_name: 'srm-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['srm-api:9000']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9101']