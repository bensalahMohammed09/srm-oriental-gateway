# ==============================================================================
# FICHIER D'OVERRIDE POUR JENKINS (CI/CD)
# Ce fichier remplace les montages de dossiers locaux (./infra) par 
# des volumes nommés injectés par Jenkins, sans casser le dev local.
# ==============================================================================

services:
  srm-admin-proxy:
    volumes:
      # Changed to directory mount
      - ci_admin_conf:/etc/nginx/conf.d:ro
  srm-dashboard:
    volumes:
      # Changed to directory mount (Will hold both default.conf AND security_headers.conf)
      - ci_public_conf:/etc/nginx/conf.d:ro
  prometheus:
    volumes:
      # Changed to directory mount
      - ci_prometheus_conf:/etc/prometheus:ro
  loki:
    volumes:
      # Changed to directory mount
      - ci_loki_config:/etc/loki:ro
  promtail:
    volumes:
      # Changed to directory mount
      - ci_promtail_config:/etc/promtail:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
  grafana:
    volumes:
      - grafana_data:/var/lib/grafana
      - ci_grafana_provisioning:/etc/grafana/provisioning:ro

volumes:
  ci_admin_conf:
    name: srm-oriental-gateway_admin_conf
    external: true
  ci_public_conf:
    name: srm-oriental-gateway_public_conf
    external: true
  ci_prometheus_conf:
    name: srm-oriental-gateway_prometheus_config
    external: true
  ci_loki_config:
    name: srm-oriental-gateway_loki_config
    external: true
  ci_promtail_config:
    name: srm-oriental-gateway_promtail_config
    external: true
  ci_grafana_provisioning:
    name: srm-oriental-gateway_grafana_provisioning
    external: true