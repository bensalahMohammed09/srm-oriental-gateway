# ==============================================================================
# FICHIER D'OVERRIDE POUR JENKINS (CI/CD)
# ==============================================================================

services:
  srm-admin-proxy:
    volumes:
      - ci_admin_conf:/etc/nginx/conf.d:ro
  srm-dashboard:
    volumes:
      - ci_public_conf:/etc/nginx/conf.d:ro
  prometheus:
    volumes:
      - ci_prometheus_conf:/etc/prometheus:ro
  loki:
    volumes:
      - ci_loki_config:/etc/loki:ro
  promtail:
    volumes:
      - ci_promtail_config:/etc/promtail:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
  grafana:
    volumes:
      - grafana_data:/var/lib/grafana
      - ci_grafana_provisioning:/etc/grafana/provisioning:ro

  # FIX OCR : Remplacement du dossier local par un volume nommé sécurisé
  srm-api:
    volumes:
      - ci_ocr_uploads:/app/uploads
      
  srm-ocr-worker:
    volumes:
      - ci_ocr_uploads:/home/srm_worker/app/uploads

volumes:
  ci_admin_conf:
    name: srm-oriental-gateway_admin_conf
    external: true
  ci_public_conf:
    name: srm-oriental-gateway_public_conf
    external: true
  ci_prometheus_conf:
    name: srm-oriental-gateway_prometheus_config
    external: true
  ci_loki_config:
    name: srm-oriental-gateway_loki_config
    external: true
  ci_promtail_config:
    name: srm-oriental-gateway_promtail_config
    external: true
  ci_grafana_provisioning:
    name: srm-oriental-gateway_grafana_provisioning
    external: true
  # Le volume partagé pour les uploads OCR
  ci_ocr_uploads:
    name: srm-oriental-gateway_ocr_uploads
    external: true