# ==============================================================================
# SRM ORIENTAL GATEWAY - INFRASTRUCTURE ORCHESTRATION
# Project: Bureau d'Ordre Digital & OCR Invoice Tracking
# ==============================================================================
name: srm-oriental-gateway
services:
  # ----------------------------------------------------------------------------
  # CI/CD PIPELINE (Jenkins)
  # ----------------------------------------------------------------------------
  jenkins-srm:
    build:
      context: .
      dockerfile: infra/docker/jenkins.Dockerfile
    container_name: jenkins-srm
    user: root # Required to interact with host Docker socket
    ports:
      - "8085:8080"
      - "50000:50000"
    volumes:
      - jenkins-srm_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Docker-in-Docker capability
    environment:
      - JAVA_OPTS=-Xmx512m -Xms512m
    deploy:
      resources:
        limits:
          memory: 1.5G 
    networks:
      - sec-net
      - ops-net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # BACKEND API (.NET)
  # ----------------------------------------------------------------------------
  srm-api:
    build:
      context: ./src/backend
      dockerfile: ../../infra/docker/api.Dockerfile
      args:
        DOTNET_VERSION: ${DOTNET_VERSION}
        API_INTERNAL_PORT: ${API_INTERNAL_PORT}
        API_ENV: ${API_ENV}
    container_name: srm-api
    ports:
      - "${API_EXTERNAL_PORT}:${API_INTERNAL_PORT}"
    volumes:
      - srm_uploads:/app/uploads # Shared folder for invoice PDF storage
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - web-net
      - back-net
      - ops-net
    depends_on:
      - srm-db

  # ----------------------------------------------------------------------------
  # FRONTEND DASHBOARD (React/Next.js + Nginx)
  # ----------------------------------------------------------------------------
  srm-dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
        NGINX_VERSION: ${NGINX_VERSION}
        DASHBOARD_INTERNAL_PORT: ${DASHBOARD_INTERNAL_PORT}
    container_name: srm-dashboard
    environment:
      - DASHBOARD_INTERNAL_PORT=${DASHBOARD_INTERNAL_PORT}
    ports:
      - "${DASHBOARD_EXTERNAL_PORT}:${DASHBOARD_INTERNAL_PORT}"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - web-net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # WORKER OCR (Python + Tesseract)
  # ----------------------------------------------------------------------------
  srm-ocr-worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
      args:
        BASE_IMAGE:    ${BASE_IMAGE}
        SRM_USER_ID:   ${SRM_USER_ID}
        SRM_GROUP_ID:  ${SRM_GROUP_ID}
        WORKER_ENV:    ${WORKER_ENV}
    container_name: srm-ocr-worker
    volumes:
      - srm_uploads:/home/srm_worker/app/uploads        # Shared folder to read PDFs
    deploy:
      resources:
        limits:
          memory: 1G                                    # OCR is CPU/Memory intensive
    networks:
      - back-net
      - ops-net
    depends_on:
      srm-db:
        condition: service_healthy
    restart: on-failure
      
  # ----------------------------------------------------------------------------
  # PRIMARY DATABASE (PostgreSQL)
  # ----------------------------------------------------------------------------
  srm-db:
    build:
      context: .
      dockerfile: infra/docker/db.Dockerfile
      args:
        POSTGRES_VERSION: ${POSTGRES_VERSION}
    container_name: srm-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGPORT=${DB_INTERNAL_PORT}
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: # Essential for dependent services (API/Worker)
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - back-net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # WORKFLOW AUTOMATION (n8n)
  # ----------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    platform: linux/amd64
    user: "1000:1000"
    ports:
      - "${N8N_EXTERNAL_PORT}:${N8N_INTERNAL_PORT}"
    stop_grace_period: 60s
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_INTERNAL_PORT}
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_URL=http://localhost:${N8N_EXTERNAL_PORT}/ 
      - N8N_EXECUTORS_PROCESS=main
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ops-net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # OBSERVABILITY STACK (Prometheus, Loki, Grafana, Promtail)
  # ----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    platform: linux/amd64
    user: root
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT}:${PROMETHEUS_INTERNAL_PORT}"
    volumes:
      - prometheus_config:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ops-net
    restart: unless-stopped
    
  loki:
    image: grafana/loki:latest
    container_name: loki
    platform: linux/amd64
    ports:
      - "${LOKI_EXTERNAL_PORT}:${LOKI_INTERNAL_PORT}"
    user: "0"
    volumes:
      - loki_config:/etc/loki
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ops-net
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: infra/docker/grafana.Dockerfile
      args:
        GRAFANA_VERSION: ${GRAFANA_VERSION}
        GRAFANA_INTERNAL_PORT: ${GRAFANA_INTERNAL_PORT}
        GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    container_name: grafana
    ports:
      - "${GRAFANA_EXTERNAL_PORT}:${GRAFANA_INTERNAL_PORT}"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning # Auto-config datasources
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ops-net
# add comment to test
  promtail:
    build:
      context: .
      dockerfile: infra/docker/promtail.Dockerfile
      args:
        PROMTAIL_VERSION: ${PROMTAIL_VERSION}
        # On s'assure que le port interne (ex: 9081) est bien transmis
        PROMTAIL_INTERNAL_PORT: ${PROMTAIL_INTERNAL_PORT}
    container_name: promtail
    # CRUCIAL : root est nécessaire pour lire /var/run/docker.sock
    user: root 
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - ops-net
    volumes:
      # 1. Ta configuration (celle qui contient docker_sd_configs)
      - promtail_config:/etc/promtail
      # 2. Le socket Docker en lecture seule (:ro) pour la découverte auto
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    restart: unless-stopped

  node-exporter:
    build:
      context: .
      dockerfile: infra/docker/node-exporter.Dockerfile
      args:
        NODE_EXPORTER_VERSION: ${NODE_EXPORTER_VERSION}
        NODE_EXPORTER_INTERNAL_PORT: ${NODE_EXPORTER_INTERNAL_PORT}
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
      - '--web.listen-address=:${NODE_EXPORTER_INTERNAL_PORT}'
    ports:
      - "${NODE_EXPORTER_EXTERNAL_PORT}:${NODE_EXPORTER_INTERNAL_PORT}"
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped
    volumes:
      - '/:/host:ro'
    networks:
      - ops-net

  # ----------------------------------------------------------------------------
  # CODE QUALITY & SECURITY (SonarQube)
  # ----------------------------------------------------------------------------
  sonar-db:
    build: 
      context: .
      dockerfile: infra/docker/sonar-db.Dockerfile
      args:
        SONAR_DB_VERSION: ${SONAR_DB_VERSION}
        SONAR_DB_NAME: ${SONAR_DB_NAME}
        SONAR_DB_USER: ${SONAR_DB_USER}
        SONAR_DB_PASSWORD: ${SONAR_DB_PASSWORD}
        SONAR_DB_INTERNAL_PORT: ${SONAR_DB_INTERNAL_PORT}
    container_name: sonar-db
    ports:
      - "${SONAR_DB_EXTERNAL_PORT}:${SONAR_DB_INTERNAL_PORT}"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - sec-net
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

  sonarqube:
    build:
      context: .
      dockerfile: infra/docker/sonarqube.Dockerfile
      args:
        SONAR_VERSION: ${SONAR_VERSION}
        SONAR_INTERNAL_PORT: ${SONAR_INTERNAL_PORT}
        SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME}
        SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD}
        SONAR_DB_INTERNAL_PORT: ${SONAR_DB_INTERNAL_PORT}
        SONAR_DB_NAME: ${SONAR_DB_NAME}
        SONAR_JDBC_URL: ${SONAR_JDBC_URL}
    container_name: sonarqube
    environment:
      - SONAR_WEB_JAVAOPTS=-Xmx512m -Xms512m
      - SONAR_CE_JAVAOPTS=-Xmx512m -Xms512m
      - SONAR_SEARCH_JAVAOPTS=-Xmx512m -Xms512m 
    deploy:
      resources:
        limits:
          memory: 2G # SonarQube requires significant RAM for analysis
    ports:
      - "${SONAR_EXTERNAL_PORT}:${SONAR_INTERNAL_PORT}"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - sec-net
    depends_on:
      - sonar-db

# ==============================================================================
# NETWORKS DEFINITION
# ==============================================================================
networks:
  web-net:  # Public facing traffic
  back-net: # Internal app communication (API <-> DB)
  ops-net:  # Monitoring & CI/CD traffic
  sec-net:  # Security scanning traffic (SonarQube)

# ==============================================================================
# VOLUMES DEFINITION (Persistent Data)
# ==============================================================================
volumes:
  jenkins-srm_data:
  postgres_data:
  n8n_data:
  prometheus_data:
  loki_data:
  grafana_data:
  sonar_db_data:
  sonarqube_data:
  sonarqube_extensions:
  srm_uploads: # Essential for cross-service PDF handling
  loki_config:
  prometheus_config:
  promtail_config: